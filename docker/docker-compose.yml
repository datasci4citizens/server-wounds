services:

  db:
    container_name: database_wounds
    image: postgres:18.4
    env_file:
      - ../.env
    volumes:
      - wound-data:/var/lib/postgresql
    restart: always
    environment:
      POSTGRES_USER: ${SERVER_WOUNDS_DB_USER}
      POSTGRES_PASSWORD: ${SERVER_WOUNDS_DB_PASSWORD}
      POSTGRES_DB: ${SERVER_WOUNDS_DATABASE}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVER_WOUNDS_DB_USER} -d ${SERVER_WOUNDS_DATABASE} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    container_name: django_server_wounds
    build:
      context: ..
      dockerfile: docker/dockerfile
    entrypoint: python docker/entrypoint.py
    env_file:
      - ../.env
    volumes:
     - ..:/code:z

    restart: on-failure:3
    environment:
      DEBUG: ${DEBUG}
      SERVER_WOUNDS_DB_HOST: db
      SERVER_WOUNDS_DB_PORT: 5432
      SERVER_WOUNDS_DB_USER: ${SERVER_WOUNDS_DB_USER}
      SERVER_WOUNDS_DB_PASSWORD: ${SERVER_WOUNDS_DB_PASSWORD}
      SERVER_WOUNDS_DB_NAME: ${SERVER_WOUNDS_DATABASE}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      AWS_S3_ENDPOINT_URL: http://seaweedfs-s3:8333
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME:-us-east-1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_started
    networks:
      - internal
      - public

  seaweedfs-master:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-master
    ports:
      - "9333:9333"
    command: master -ip=seaweedfs-master
    volumes:
      - seaweedfs-data:/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "echo 'list' | weed shell -master=localhost:9333 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-volume
    ports:
      - "8080:8080"
    command: volume -mserver=seaweedfs-master:9333 -port=8080 -ip=seaweedfs-volume
    volumes:
      - seaweedfs-data:/data
    restart: always
    depends_on:
      - seaweedfs-master
    networks:
      - internal

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-filer
    ports:
      - "8888:8888"
      - "18888:18888"
    command: filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer
    volumes:
      - seaweedfs-data:/data
    restart: always
    depends_on:
      - seaweedfs-master
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-s3
    ports:
      - "8333:8333"
    command: s3 -domainName=localhost -ip.bind=0.0.0.0 -filer=seaweedfs-filer:8888
    restart: always
    depends_on:
      - seaweedfs-filer
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8333/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - public

networks:
  internal:
    internal: true
  public:
    driver: bridge

volumes:
  wound-data:
    driver: local
    driver_opts:
      type: "none"
      device: ${EXTERNAL_MAPPING_PATH}
      o: "bind"
  seaweedfs-data:
    driver: local
