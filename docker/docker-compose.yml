services:

  db:  # database
    container_name: database_wounds
    image: postgres:latest
    volumes:
      - wound-data:/var/lib/postgresql
    restart: on-failure:3
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${SERVER_WOUNDS_DB_USER}
      POSTGRES_PASSWORD: ${SERVER_WOUNDS_DB_PASSWORD}
      POSTGRES_DB: ${SERVER_WOUNDS_DATABASE}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVER_WOUNDS_DB_USER} -d ${SERVER_WOUNDS_DATABASE} -h localhost -p 5432"]
      interval: 1m30s
      timeout: 30s
      retries: 2
      start_period: 3s  

  web: # server
    container_name: django_server_wounds
    build:
      context: ..
      dockerfile: docker/dockerfile
    entrypoint: ["bash", "/code/docker/entrypoint.sh"]

    volumes:
      - ..:/code:z

    restart: on-failure:3

    environment:
      DEBUG: ${DEBUG}
      SERVER_WOUNDS_DB_HOST: ${SERVER_WOUNDS_DB_HOST}
      SERVER_WOUNDS_DB_PORT: ${SERVER_WOUNDS_DB_PORT}
      SERVER_WOUNDS_DB_USER: ${SERVER_WOUNDS_DB_USER}
      SERVER_WOUNDS_DB_PASSWORD: ${SERVER_WOUNDS_DB_PASSWORD}
      SERVER_WOUNDS_DB_NAME: ${SERVER_WOUNDS_DATABASE}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SERVER_WOUNDS_SECRET_KEY: ${SERVER_WOUNDS_SECRET_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
      AWS_S3_REGION_NAME: ${AWS_S3_REGION_NAME}

    ports:
      - "8000:8000"
    
    depends_on:
      db:
        condition: service_healthy
      seaweedfs-s3:
        condition: service_started

  seaweedfs-master:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-master
    ports:
      - "9333:9333"
    command: master -ip=seaweedfs-master
    volumes:
      - seaweedfs-data:/data

  seaweedfs-volume:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-volume
    ports:
      - "8080:8080"
    command: volume -mserver=seaweedfs-master:9333 -port=8080 -ip=seaweedfs-volume
    volumes:
      - seaweedfs-data:/data
    depends_on:
      - seaweedfs-master

  seaweedfs-filer:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-filer
    ports:
      - "8888:8888"
      - "18888:18888"
    command: filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer
    volumes:
      - seaweedfs-data:/data
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume

  seaweedfs-s3:
    image: chrislusf/seaweedfs:3.59
    container_name: seaweedfs-s3
    ports:
      - "8333:8333"
    command: s3 -domainName=localhost -filer=seaweedfs-filer:8888
    depends_on:
      - seaweedfs-filer

volumes:
  wound-data:
    driver_opts:
      type: "none"
      device: ${EXTERNAL_MAPPING_PATH}
      o: "bind"
  seaweedfs-data:
